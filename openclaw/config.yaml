# OpenClaw 主配置文件
# 敏感信息（API keys）建议通过环境变量覆盖，格式：OPENCLAW__LLM_PROVIDERS__OPENAI__API_KEY=xxx

llm_providers:
  openai:
    api_key: ""  # 或通过环境变量 OPENCLAW__LLM_PROVIDERS__OPENAI__API_KEY
    base_url: "https://api.openai.com/v1"
  deepseek:
    api_key: ""
    base_url: "https://api.deepseek.com/v1"
  doubao:
    api_key: ""
    base_url: "https://ark.cn-beijing.volces.com/api/v3"
  qwen:
    api_key: ""
    base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"

llm_preset: "cost_effective"  # cost_effective | quality | flagship | china_eco | custom

platforms:
  bilibili:
    cookie_path: "./cookies/bilibili.txt"
    cookie_refresh_days: 7
    request_delay: [2.0, 6.0]
  douyin:
    cookie_path: "./cookies/douyin.txt"
    cookie_refresh_days: 3
    request_delay: [3.0, 8.0]
  youtube:
    cookie_path: null
    cookie_refresh_days: 30
    request_delay: [1.0, 4.0]
  xiaohongshu:
    cookie_path: "./cookies/xiaohongshu.txt"
    cookie_refresh_days: 5
    request_delay: [3.0, 8.0]

storage:
  db_type: "sqlite"
  db_path: "./data/openclaw.db"
  cache_enabled: true
  cache_ttl_hours: 72

proxy_enabled: false
# proxy_pool:
#   - "http://proxy1:8080"
#   - "socks5://proxy2:1080"

log_level: "INFO"
log_file: "./logs/openclaw.log"
